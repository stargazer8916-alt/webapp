<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Neon Flip: Underworld</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #050505; /* Глубокий черный */
            color: #e0e0e0;
            overflow-x: hidden;
        }
        .neon-text { font-family: 'Orbitron', sans-serif; }
        .neon-border {
            border: 1px solid rgba(0, 255, 255, 0.3);
            box-shadow: 0 0 15px rgba(0, 255, 255, 0.1);
        }
        .cyan-glow {
            text-shadow: 0 0 10px rgba(0, 255, 255, 0.7);
            color: #00ffff;
        }
        .rare-gradient { background: linear-gradient(135deg, #0a0a0c 0%, #1e3a8a 150%); border-left: 4px solid #3b82f6; }
        .legend-gradient { background: linear-gradient(135deg, #0a0a0c 0%, #7c2d12 150%); border-left: 4px solid #ef4444; }
        .tab-active { border-bottom: 2px solid #00ffff; color: #00ffff; }
    </style>
</head>
<body class="p-4">

    <div class="flex justify-between items-center mb-6">
        <div>
            <h1 class="neon-text text-xl font-bold cyan-glow uppercase tracking-wider">Underworld</h1>
            <p class="text-xs text-gray-500 uppercase">Rank: Street Dealer</p>
        </div>
        <div class="bg-zinc-900 px-4 py-2 rounded-lg neon-border">
            <span class="text-xs text-gray-400 block uppercase">Balance</span>
            <span class="neon-text text-lg text-white" id="balance">1,250.00 G</span>
        </div>
    </div>

    <div id="market-view" class="view-segment space-y-4 pb-24">
        <h2 class="text-sm font-semibold text-zinc-500 uppercase tracking-widest mb-2">Market Hot Deals</h2>
        
        <div class="rare-gradient p-4 rounded-xl flex items-center justify-between transition-transform active:scale-95">
            <div class="flex items-center space-y-1">
                <div class="w-12 h-12 bg-zinc-800 rounded flex items-center justify-center mr-4 border border-zinc-700">
                    <span class="text-2xl">🔫</span>
                </div>
                <div>
                    <h3 class="font-bold text-sm">G22 | Blue Flame</h3>
                    <span class="text-[10px] bg-blue-900/40 text-blue-400 px-2 py-0.5 rounded border border-blue-500/30">RARE</span>
                </div>
            </div>
            <button class="bg-zinc-100 text-black px-4 py-2 rounded-lg font-bold text-sm hover:bg-cyan-400 transition-colors">192.12 G</button>
        </div>

        <div class="legend-gradient p-4 rounded-xl flex items-center justify-between transition-transform active:scale-95">
            <div class="flex items-center space-y-1">
                <div class="w-12 h-12 bg-zinc-800 rounded flex items-center justify-center mr-4 border border-zinc-700">
                    <span class="text-2xl">🔪</span>
                </div>
                <div>
                    <h3 class="font-bold text-sm">M9 | Crimson Web</h3>
                    <span class="text-[10px] bg-red-900/40 text-red-400 px-2 py-0.5 rounded border border-red-500/30">LEGENDARY</span>
                </div>
            </div>
            <button class="bg-zinc-100 text-black px-4 py-2 rounded-lg font-bold text-sm">2,450 G</button>
        </div>
    </div>

    <div id="cases-view" class="view-segment hidden flex flex-col items-center justify-center space-y-8 pt-10">
        <div class="relative">
            <div class="absolute inset-0 bg-cyan-500 blur-3xl opacity-20"></div>
            <div class="w-48 h-48 bg-zinc-900 neon-border rounded-2xl flex items-center justify-center relative z-10">
                <span class="text-6xl animate-pulse">📦</span>
            </div>
        </div>
        <div class="text-center">
            <h3 class="neon-text text-xl mb-2">NEON CASE</h3>
            <p class="text-gray-500 text-sm italic">Contains high-contrast anime skins</p>
        </div>
        <button onclick="openCase()" class="w-full max-w-xs bg-cyan-500 text-black font-black py-4 rounded-2xl neon-text tracking-tighter hover:bg-cyan-400 shadow-[0_0_25px_rgba(0,255,255,0.4)]">OPEN 50.00 G</button>
    </div>

    <div class="fixed bottom-6 left-4 right-4 bg-zinc-900/90 backdrop-blur-lg rounded-2xl p-2 flex justify-around border border-white/10 shadow-2xl z-50">
        <button onclick="showView('market')" class="flex flex-col items-center p-2 tab-active transition-all" id="tab-market">
            <span class="text-xl">🏪</span>
            <span class="text-[10px] uppercase mt-1">Market</span>
        </button>
        <button onclick="showView('cases')" class="flex flex-col items-center p-2 text-zinc-500" id="tab-cases">
            <span class="text-xl">📦</span>
            <span class="text-[10px] uppercase mt-1">Cases</span>
        </button>
        <button onclick="showView('battle')" class="flex flex-col items-center p-2 text-zinc-500" id="tab-battle">
            <span class="text-xl">⚔️</span>
            <span class="text-[10px] uppercase mt-1">Battle</span>
        </button>
    </div>

    <script>
        // Инициализация Telegram WebApp
        const tg = window.Telegram.WebApp;
        tg.expand(); // Расширяем на весь экран
        tg.headerColor = '#050505';

        // Логика переключения вкладок
        function showView(viewId) {
            document.querySelectorAll('.view-segment').forEach(el => el.classList.add('hidden'));
            document.getElementById(viewId + '-view').classList.remove('hidden');
            
            // Сброс стилей кнопок
            document.querySelectorAll('nav button, div button').forEach(el => {
                if(el.id && el.id.startsWith('tab-')) el.classList.remove('tab-active', 'text-cyan-400');
            });
            document.getElementById('tab-' + viewId).classList.add('tab-active');
            
            // Легкая вибрация при переключении
            tg.HapticFeedback.impactOccurred('light');
        }

        // Пример функции открытия кейса
        function openCase() {
            tg.HapticFeedback.notificationOccurred('success');
            alert('Opening Case... (Здесь будет анимация рулетки)');
            // Тут можно добавить логику вычитания баланса и добавления предмета
        }

        // Сообщаем TG, что приложение готово
        tg.ready();
    </script>
</body>
</html>
